bots:
  - bot_id: bot_a
    bot_name: "Bot A – FreqForge Core"
    alias: bot_a
    container: trading-freqtrade-freqforge-1
    strategy: FreqForge_Override
    schedules:
      analyze: "*/15 * * * *"
      backtest: "0 */6 * * *"
      daily_report: "0 8 * * *"
      walkforward: "0 2 * * 0"

  - bot_id: bot_b
    bot_name: "Bot B – Momentum Scalper"
