name: Main Gate

# Always reports on every pull request targeting main.
# This ensures branch protection has a required check that never deadlocks
# unrelated PRs. Path-filtered workflows (offline-smoke, phase2-proposal-gate)
# are NOT safe to require because they skip on non-matching PRs, leaving a
# permanent "pending" status that blocks merging.

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  main-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          python -m pip install -e ./self_improvement_v2

      - name: Compile check (critical Python paths)
        run: |
          python -m compileall -x '(support|fixtures|__pycache__)' \
            bridge \
            primo \
            shadowlock \
            intelligence \
            orchestrator \
            tests \
            scripts \
            self_improvement_v2

      - name: Ruff check (touched root contracts and tooling)
        run: |
          ruff check \
            freqtrade/shared/kill_switch.py \
            scripts/secret_scan.py \
            tests/test_kill_switch_dry_run_integration.py \
            tests/test_runtime_config_containment.py \
            tests/test_secret_scan_contracts.py

      - name: Ruff check (SI v2)
        run: |
          ruff check self_improvement_v2

      - name: Repository secret scan
        run: |
          python scripts/secret_scan.py --tracked

      - name: Root safe test suite
        run: |
          python -m pytest tests -q

      - name: Docker/Fleet static contract tests
        run: |
          python -m pytest tests/test_docker_compose_contracts.py -q

      - name: Control plane tests
        run: |
          PYTHONPATH=. pytest orchestrator/control/tests/ -q

      - name: Live-trading invariants
        run: |
          pytest \
            self_improvement_v2/tests/test_no_any_types.py \
            self_improvement_v2/tests/test_no_forbidden_patterns.py \
            self_improvement_v2/tests/test_live_trading_invariants.py \
            -q

      - name: Gate passed
        run: |
          echo "Main Gate: all checks passed"
