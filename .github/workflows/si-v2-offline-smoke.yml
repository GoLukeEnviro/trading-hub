name: SI v2 Offline Smoke

on:
  pull_request:
    paths:
      - "self_improvement_v2/**"
      - ".github/workflows/si-v2-offline-smoke.yml"
      - "pyproject.toml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  offline-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          python -m pip install -e ./self_improvement_v2
          python -m pip install pytest httpx pandas

      - name: Compile SI v2
        run: |
          python -m compileall -x '(support|fixtures)' self_improvement_v2

      - name: Run SI v2 tests
        run: |
          pytest self_improvement_v2 -q --ignore=self_improvement_v2/tests/test_fleet_risk_manager.py

      - name: Ruff check
        run: |
          ruff check self_improvement_v2

      - name: Planning checker CLI smoke test (#145)
        run: |
          python -m cli.planning_checker explain-finding SCHEMA_INVALID

      - name: Planning package smoke test (#145)
        run: |
          python - <<'PY'
          """Offline planning CI gate — verify planning pipeline works on fixture data."""
          from pathlib import Path

          import cli.planning_checker

          # 1. Verify the CLI tool builds its parser correctly
          parser = cli.planning_checker.build_parser()
          assert parser is not None, "CLI parser must build"

          # 2. Test explain-finding for every ReasonCode
          from rehearsal.planning_models import ReasonCode
          for rc in ReasonCode:
              code = cli.planning_checker.cmd_explain_finding(
                  type("Args", (), {"reason_code": rc.value})()
              )
              assert code == 0, f"explain-finding {rc.value} returned {code}"

          # 3. Verify redaction checker can load and scan fixtures
          from rehearsal.redaction_checker import RedactionChecker
          checker = RedactionChecker()
          fixture_root = Path("self_improvement_v2/tests/fixtures/proposal_package")
          for fixture_file in sorted(fixture_root.rglob("*.json")):
              text = fixture_file.read_text(encoding="utf-8")
              findings = checker.check_artifact(text)
              # Valid fixtures should pass clean; invalid fixtures may have findings
              print(f"  {fixture_file.relative_to(fixture_root.parent)}: {len(findings)} findings")

          # 4. Verify semantic consistency is importable
          from rehearsal.semantic_consistency import run_semantic_consistency
          from rehearsal.planning_models import ValidationResult
          result = ValidationResult(package_path=str(fixture_root))
          result = run_semantic_consistency(result, [])
          assert result is not None, "Semantic consistency must return a result"

          print("✅ Planning CI gate: ALL checks passed")
          PY

      - name: Validate JSON files
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          roots = [Path("self_improvement_v2")]
          failures = []

          for root in roots:
              for path in root.rglob("*.json"):
                  try:
                      json.loads(path.read_text(encoding="utf-8"))
                  except Exception as exc:
                      failures.append(f"{path}: {exc}")

          if failures:
              raise SystemExit("\n".join(failures))

          print("JSON validation passed")
          PY
