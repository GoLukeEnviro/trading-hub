# SI v2 Offline Smoke Workflow
#
# Runs on push/PR to main or the feature branch.
# Executes a deterministic offline-only test subset with no external
# dependencies (no Docker, Freqtrade, Telegram, exchange, or secrets).
#
# FAILURE CONDITIONS:
# - Python compile errors
# - Invalid JSON files
# - pytest failures in the SI v2 pipeline subset
# - Ruff lint violations

name: SI v2 Offline Smoke

on:
  push:
    branches: [main, "feat/si-v2-**"]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.13"

jobs:
  smoke:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: self_improvement_v2

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,test]" 2>/dev/null || pip install pytest ruff

      - name: Python compile check
        run: python -m compileall .

      - name: JSON parse check
        run: |
          echo "Checking JSON files..."
          for f in $(find . -name "*.json" -not -path "./.git/*" -not -path "./.venv/*"); do
            python -m json.tool "$f" >/dev/null 2>&1 || { echo "INVALID JSON: $f"; exit 1; }
          done
          echo "All JSON files valid."

      - name: Run SI v2 pipeline tests
        run: |
          python -m pytest tests/ -q \
            -k "rainbow or evidence or regime or attribution or quality \
                or manifest or readiness or episode" \
            --ignore-glob="*ai4trade*"

      - name: Ruff lint check
        run: ruff check .
