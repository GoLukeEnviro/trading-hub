name: SI v2 Phase 2 Proposal Gate

on:
  pull_request:
    paths:
      - "self_improvement_v2/src/si_v2/evidence/**"
      - "self_improvement_v2/src/si_v2/propose/**"
      - "self_improvement_v2/src/si_v2/reports/**"
      - "self_improvement_v2/src/si_v2/validation/**"
      - "self_improvement_v2/tests/test_no_any_types.py"
      - "self_improvement_v2/tests/test_no_forbidden_patterns.py"
      - "self_improvement_v2/tests/test_live_trading_invariants.py"
      - "self_improvement_v2/tests/test_phase2_e2e_integration.py"
      - ".github/workflows/si-v2-phase2-proposal-gate.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  phase2-proposal-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ./self_improvement_v2
          python -m pip install pytest ruff

      - name: Compile SI v2 proposal stack
        run: |
          python -m compileall -x '(support|fixtures)' \
            self_improvement_v2/src/si_v2/evidence \
            self_improvement_v2/src/si_v2/propose \
            self_improvement_v2/src/si_v2/reports \
            self_improvement_v2/src/si_v2/validation

      - name: Ruff check proposal stack
        run: |
          ruff check \
            self_improvement_v2/src/si_v2/evidence \
            self_improvement_v2/src/si_v2/propose \
            self_improvement_v2/src/si_v2/reports \
            self_improvement_v2/src/si_v2/validation

      - name: Evidence Input Pipeline tests
        run: |
          pytest self_improvement_v2/tests/test_evidence_input_pipeline.py -q

      - name: Proposal Scoring tests
        run: |
          pytest self_improvement_v2/src/si_v2/propose/proposal_scoring/tests -q

      - name: Weight Proposal tests
        run: |
          pytest self_improvement_v2/src/si_v2/propose/weight_proposal/tests -q

      - name: Episode Report tests
        run: |
          pytest self_improvement_v2/src/si_v2/reports/tests -q

      - name: Validation Gate Matrix tests
        run: |
          pytest self_improvement_v2/src/si_v2/validation/tests -q

      - name: Phase 2 end-to-end integration tests
        run: |
          pytest self_improvement_v2/tests/test_phase2_e2e_integration.py -q

      - name: Global invariants
        run: |
          pytest \
            self_improvement_v2/tests/test_no_any_types.py \
            self_improvement_v2/tests/test_no_forbidden_patterns.py \
            self_improvement_v2/tests/test_live_trading_invariants.py -q
