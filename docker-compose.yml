services:
  docker-proxy:
    image: tecnativa/docker-socket-proxy:latest
    restart: unless-stopped
    environment:
      CONTAINERS: 1
      SERVICES: 1
      NETWORKS: 1
      INFO: 1
      EVENTS: 1
      PING: 1
      VERSION: 1
      POST: 1
      ALLOW_RESTARTS: 1
      ALLOW_START: 1
      ALLOW_STOP: 1
      IMAGES: 1
      VOLUMES: 1
      EXEC: 0
      BUILD: 0
      COMMIT: 0
      SECRETS: 0
    volumes:
    - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
    - proxy-net
  ai-hedge-fund:
    image: trading-ai-hedge-fund-crypto:latest
    command:
    - python3
    - docker/service_entrypoint.py
    ports:
    - 127.0.0.1:8410:8080
    env_file:
    - ./ai-hedge-fund-crypto/.env
    environment:
    - SERVICE_PORT=8080
    volumes:
    - ./ai-hedge-fund-crypto/output:/app/output
    healthcheck:
      test:
      - CMD
      - python3
      - -c
      - import urllib.request, json; d=json.loads(urllib.request.urlopen('http://localhost:8080/health').read());
        exit(0 if d['status']=='ok' else 1)
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    restart: unless-stopped
    networks:
    - hermes-net
    - proxy-net
  hermes-green:
    image: nousresearch/hermes-agent:latest
    tty: true
    stdin_open: true
    environment:
      DOCKER_HOST: tcp://docker-proxy:2375
      PUID: 10000
      PGID: 10000
      HERMES_DASHBOARD: 1
      HERMES_DASHBOARD_INSECURE: 1
      HERMES_DASHBOARD_TUI: 1
      HERMES_DASHBOARD_HOST: 0.0.0.0
      HERMES_DASHBOARD_PORT: 9119
    volumes:
    - /opt/hermes-green/config:/opt/data
    - /opt/hermes/ssh:/home/hermes/.ssh:ro
    - /home/hermes/projects:/home/hermes/projects:rw
    - /home/hermes/projects/trading/weatherhermes_persistent/weatherbot_master:/home/hermes/weatherbot_master:ro
    - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped
    networks:
    - hermes-net
    - proxy-net
    depends_on:
    - docker-proxy
    container_name: hermes-green
    command:
    - sleep
    - infinity
    env_file: /opt/hermes-green/.env
    ports:
    - 127.0.0.1:8083:9119
    - 127.0.0.1:8642:8642
    logging:
      driver: json-file
      options:
        max-size: 50m
        max-file: '3'
  green-qdrant:
    image: qdrant/qdrant:latest
    volumes:
    - green-qdrant-data:/qdrant/storage
    networks:
    - hermes-net
    restart: unless-stopped
    container_name: green-qdrant
    logging:
      driver: json-file
      options:
        max-size: 20m
        max-file: '3'
  green-ollama:
    image: ollama/ollama:latest
    volumes:
    - green-ollama-data:/root/.ollama
    networks:
    - hermes-net
    restart: unless-stopped
    container_name: green-ollama
    # Fix G-02: removed broken "command: [sleep, infinity]" which collided
    # with ollama entrypoint. Now runs default "ollama serve" for Mem0 embeddings.
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: 20m
        max-file: '3'
  green-mem0:
    image: hermes-mem0-local-api:stable
    networks:
    - trading_hermes-net
    restart: unless-stopped
    depends_on:
    - green-qdrant
    - green-ollama
    container_name: green-mem0
    environment:
      QDRANT_HOST: green-qdrant
      QDRANT_PORT: 6333
      OLLAMA_BASE_URL: http://green-ollama:11434
      MEM0_COLLECTION: hermes_memories_v2
      MEM0_EMBEDDER_MODEL: qwen3-embedding:4b
      MEM0_EMBEDDING_DIMS: 1024
      MEM0_API_HOST: 0.0.0.0
      MEM0_API_PORT: 8787
      OLLAMA_API_KEY: ${OLLAMA_API_KEY}
    env_file: /opt/hermes-green/.env
    ports:
    - 127.0.0.1:8788:8787
    logging:
      driver: json-file
      options:
        max-size: 20m
        max-file: '3'
  freqtrade-freqforge:
    image: freqtradeorg/freqtrade:stable
    ports:
    - 127.0.0.1:8086:8080
    command: trade --config /freqtrade/user_data/config.json --strategy FreqForge_Override
    env_file: /opt/data/.env.telegram
    volumes:
    - ./freqforge/user_data:/freqtrade/user_data
    - ./freqtrade/shared:/freqtrade/shared
    - ./freqtrade/shared/primo_signal_state.json:/freqtrade/user_data/primo_signal_state.json:ro
    restart: unless-stopped
    mem_limit: 512m
    cpus: '1.0'
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/v1/ping >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
    - hermes-net
  freqtrade-regime-hybrid:
    image: freqtradeorg/freqtrade:stable
    command: trade --config /freqtrade/user_data/config.json --strategy RegimeSwitchingHybrid_v7_v04_Integration
    ports:
    - 127.0.0.1:8085:8080
    env_file: /opt/data/.env.telegram
    volumes:
    - ./freqtrade/bots/regime-hybrid/user_data:/freqtrade/user_data
    - ./freqtrade/shared:/freqtrade/shared
    - ./freqtrade/shared/primo_signal_state.json:/freqtrade/user_data/primo_signal_state.json:ro
    restart: unless-stopped
    mem_limit: 512m
    cpus: '1.0'
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/v1/ping >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
    - hermes-net
  freqtrade-freqforge-canary:
    image: freqtradeorg/freqtrade:stable
    command: trade --config /freqtrade/user_data/config.json --strategy FreqForge_Override
    ports:
    - 127.0.0.1:8081:8080
    env_file: /opt/data/.env.telegram
    volumes:
    - ./freqforge-canary/user_data:/freqtrade/user_data
    - ./freqtrade/shared:/freqtrade/shared
    - ./freqtrade/shared/primo_signal_state.json:/freqtrade/user_data/primo_signal_state.json:ro
    restart: unless-stopped
    mem_limit: 512m
    cpus: '0.5'
    networks:
    - hermes-net
  freqai-rebel:
    build:
      context: ./freqtrade
      dockerfile: Dockerfile.freqai-rebel
    image: freqtrade-freqai-rebel:custom
    command: trade --config /freqtrade/user_data/config.json --strategy RebelLiquidation
    ports:
    - 127.0.0.1:8087:8080
    env_file: /opt/data/.env.telegram
    volumes:
    - ./freqtrade/bots/freqai-rebel/user_data:/freqtrade/user_data
    - ./freqtrade/shared:/freqtrade/shared
    - ./freqtrade/shared/primo_signal_state.json:/freqtrade/user_data/primo_signal_state.json:ro
    restart: unless-stopped
    mem_limit: 2g
    cpus: '2.0'
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/v1/ping >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    networks:
    - hermes-net
  freqtrade-webserver:
    image: freqtradeorg/freqtrade:stable
    ports:
    - 127.0.0.1:8180:8080
    command: webserver --config /freqtrade/user_data/config.json
    env_file: /opt/data/.env.telegram
    volumes:
    - ./freqforge/user_data:/freqtrade/user_data
    restart: unless-stopped
    mem_limit: 256m
    cpus: '0.5'
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/v1/ping >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
    - hermes-net
  hermes-watchdog:
    image: alpine:latest
    command: "sh -c 'while true; do\n  for port in 8081 8085 8086 8087 8410; do\n\
      \    wget -qO- --timeout=5 http://host.docker.internal:$$port/api/v1/ping \\\
      \n      || echo \"ALERT: port $$port down at $$(date)\" >> /var/log/watchdog.log;\n\
      \  done;\n  sleep 60;\ndone'\n"
    extra_hosts:
    - host.docker.internal:host-gateway
    volumes:
    - watchdog-logs:/var/log
    restart: unless-stopped
    networks:
    - hermes-net
  caddy:
    image: caddy:alpine
    network_mode: host
    volumes:
    - ./Caddyfile:/etc/caddy/Caddyfile:ro
    - caddy_data:/data
    - caddy_config:/config
    restart: unless-stopped
  polymarket-fadi:
    image: node:20-slim
    container_name: polymarket-fadi
    entrypoint: ['/bin/bash', '/app/entrypoint.sh']
    environment:
      DRY_RUN: "true"
    volumes:
    - ./polymarket-fadi/repo:/app/repo
    - ./polymarket-fadi/entrypoint.sh:/app/entrypoint.sh:ro
    - polymarket-fadi-data:/data
    ports:
    - 127.0.0.1:9092:3001
    restart: unless-stopped
    networks:
    - ki-fabrik
  hermes-fleet-dashboard:
    image: python:3.13-slim
    container_name: hermes-fleet-dashboard
    entrypoint: ['/bin/bash', '/app/init.sh']
    environment:
      WEATHERHERMES_URL: http://172.18.0.2:9090
      BTC5M_URL: http://172.18.0.4:9090
      POLYFADI_URL: http://172.18.0.6:3001
      DATA_DIR: /data
      PORT: "5000"
    volumes:
    - ./hermes-fleet-dashboard:/app:ro
    - weatherhermes-data:/weatherhermes-data:ro
    - fleet-dashboard-data:/data
    ports:
    - 127.0.0.1:9093:5000
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    networks:
    - ki-fabrik
  weatherhermes:
    image: weatherhermes:latest
    container_name: weatherhermes
    entrypoint: ['/bin/bash', '/data/entrypoint.sh']
    command:
    - all
    environment:
      WEATHERBOT_DATA: /data
      VISUAL_CROSSING_API_KEY: ${VISUAL_CROSSING_API_KEY:-}
    env_file:
    - /opt/data/profiles/weatherbot/.env
    volumes:
    - weatherhermes-data:/data
    - ./weatherhermes_persistent/weatherbot_master/self_improve.py:/app/weatherbot/self_improve.py:ro
    - ./weatherhermes_persistent/weatherbot_master/conservative/self_improve.py:/app/weatherbot/conservative/self_improve.py:ro
    - ./weatherhermes_persistent/weatherbot_master/aggressive/self_improve.py:/app/weatherbot/aggressive/self_improve.py:ro
    - ./weatherhermes_persistent/weatherbot_master/balanced/self_improve.py:/app/weatherbot/balanced/self_improve.py:ro
    ports:
    - 127.0.0.1:9090:9090
    healthcheck:
      test:
      - CMD-SHELL
      - curl -f http://localhost:9090/api/health || exit 1
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
    - ki-fabrik
networks:
  hermes-net:
    driver: bridge
  proxy-net:
    driver: bridge
    internal: true
  ki-fabrik:
    external: true
volumes:
  green-qdrant-data:
    external: true
  green-ollama-data:
    external: true
  freqai-rebel-data: null
  watchdog-logs: null
  caddy_data:
    external: true
  caddy_config:
    external: true
  weatherhermes-data:
    external: true
  fleet-dashboard-data:
    external: true
  polymarket-fadi-data:
    external: true
